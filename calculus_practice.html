<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculus Practice – Anton 10th Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #16161e;
    --card: #1c1c27;
    --border: #2a2a3a;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --text: #e2e2ef;
    --muted: #8888aa;
    --accent: #7c6fcd;
    --green: #5fad8a;
    --red: #e06c75;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(135deg, #13131a 0%, #1a1a2e 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    color: var(--gold);
    font-size: 1.5rem;
    letter-spacing: 0.04em;
  }
  header p { color: var(--muted); font-size: 0.82rem; margin-top: 4px; }

  /* ─── NAV BAR ─── */
  .nav-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 14px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 84px;
    z-index: 99;
  }
  .nav-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--gold); color: var(--gold2); }
  .nav-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #0f0f13;
    font-weight: 700;
  }

  /* ─── MAIN LAYOUT ─── */
  main { max-width: 960px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ─── SECTION ─── */
  .section {
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .section.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 28px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--gold);
  }
  .section-header span {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* ─── PROBLEM CARD ─── */
  .prob {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: var(--radius);
    margin-bottom: 18px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .prob:hover { border-color: var(--gold); border-left-color: var(--gold2); }

  .prob-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }
  .prob-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--gold);
    background: rgba(201,168,76,0.12);
    padding: 3px 10px;
    border-radius: 4px;
    min-width: 52px;
    text-align: center;
    flex-shrink: 0;
  }
  .prob-q {
    color: var(--text);
    font-size: 0.93rem;
    line-height: 1.55;
    flex: 1;
  }
  .toggle-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .toggle-btn:hover { border-color: var(--gold); color: var(--gold); }

  .prob-solution {
    display: none;
    padding: 0 18px 18px 18px;
    border-top: 1px solid var(--border);
  }
  .prob-solution.show { display: block; }
  .prob-solution .sol-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 14px 0 8px;
  }
  .prob-solution p {
    color: #c5c5e0;
    font-size: 0.89rem;
    line-height: 1.7;
    margin-bottom: 8px;
  }
  .prob-solution .math {
    font-family: 'Space Mono', monospace;
    background: rgba(201,168,76,0.07);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 6px;
    padding: 12px 16px;
    margin: 10px 0;
    font-size: 0.84rem;
    color: var(--gold2);
    white-space: pre-wrap;
    line-height: 1.8;
  }
  .prob-solution .note {
    background: rgba(92,107,192,0.1);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    font-size: 0.82rem;
    color: #b0b0d8;
    margin-top: 8px;
  }

  /* ─── MULTI-PART ─── */
  .part { margin: 10px 0; }
  .part-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    margin-bottom: 4px;
  }

  /* ─── TOPIC TAG ─── */
  .topic-tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
  }

  /* ─── HINT ─── */
  .hint-box {
    background: rgba(95,173,138,0.07);
    border: 1px solid rgba(95,173,138,0.2);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 0.82rem;
    color: #9ed8bf;
    margin: 8px 0;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
</style>
</head>

          { label: "(b) 16(x+1)² − 8(y−3)² = 16 → (x+1)² − (y−3)²/2 = 1", steps: [

        ]

      {

        q: "Find an equation of the parabola. (a) Vertex (3, −1), axis parallel to y-axis, passes through (5, 3). (b) [see 16]",

          { label: "(a)", steps: [

// ── Build nav ──
const nav = document.getElementById('navBar');
const main = document.getElementById('mainContent');

sections.forEach((sec, idx) => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn' + (idx === 0 ? ' active' : '');
  btn.textContent = sec.label;
  btn.dataset.target = sec.id;
  btn.onclick = () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(sec.id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  nav.appendChild(btn);

  // Build section
  const div = document.createElement('div');
  div.id = sec.id;
  div.className = 'section' + (idx === 0 ? ' active' : '');

  let html = `<div class="section-header"><h2>${sec.title}</h2><span>${sec.problems.length} problems</span></div>`;

  sec.problems.forEach(prob => {
    html += `<div class="prob">
      <div class="prob-header" onclick="toggleSol(this)">
        <span class="prob-num">#${prob.num}</span>
        <span class="prob-q">${prob.q}</span>
        <button class="toggle-btn">SHOW SOL</button>
      </div>
      <div class="prob-solution">
        <div class="sol-label">Solution</div>`;

    prob.sol.forEach(part => {
      if (part.label) html += `<div class="part"><div class="part-label">${part.label}</div>`;
      part.steps.forEach(step => {
        if (step.startsWith('math:')) {
          html += `<div class="math">${step.replace('math:', '').trim()}</div>`;
        } else if (step.startsWith('note:')) {
          html += `<div class="note">💡 ${step.replace('note:', '').trim()}</div>`;
        } else {
          html += `<p>${step}</p>`;
        }
      });
      if (part.label) html += `</div>`;
    });

    html += `</div></div>`;
  });

  div.innerHTML = html;
  main.appendChild(div);
});

function toggleSol(header) {
  const sol = header.nextElementSibling;
  const btn = header.querySelector('.toggle-btn');
  sol.classList.toggle('show');
  btn.textContent = sol.classList.contains('show') ? 'HIDE SOL' : 'SHOW SOL';
}
